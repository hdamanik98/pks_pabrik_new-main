; Odoo Configuration File untuk PKS Pabrik
; =========================================

[options]
; Admin password untuk database management
admin_passwd = ${ADMIN_PASSWORD:-admin_secret_password}

; Database configuration
db_host = ${HOST:-db}
db_port = ${PORT:-5432}
db_user = ${USER:-odoo}
db_password = ${PASSWORD:-odoo_secret_password}
db_name = ${DB_NAME:-pks_production}
db_sslmode = disable
db_maxconn = 64

; Addons path
addons_path = /mnt/extra-addons

; Data directory untuk filestore dan sessions
data_dir = /var/lib/odoo

; Logging
logfile = /var/log/odoo/odoo.log
log_level = ${LOG_LEVEL:-info}
log_db = False
log_handler = [':INFO']

; Workers configuration
workers = ${WORKERS:-4}
max_cron_threads = ${MAX_CRON_THREADS:-2}
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = 1200

; HTTP configuration
http_enable = True
http_interface = 
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Session configuration
session_gc = 100000
session_timeout = 604800

; Email configuration
; email_from = odoo@pks.local
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_ssl = True
; smtp_user = 
; smtp_password = 

; Performance tuning
osv_memory_count_limit = False
osv_memory_age_limit = 1.0
max_file_upload_size = 536870912

; Security
list_db = False
; csv_internal_sep = ,
; pg_path = 
; pidfile = 

; Report configuration
reportgz = False

; Translation
translate_modules = ['all']

; Cache
; redis_host = ${REDIS_HOST:-redis}
; redis_port = ${REDIS_PORT:-6379}
; redis_dbindex = 0
; redis_password = 

; PKS Specific Configuration
[pks]
; API Token untuk REST API
api_token = ${PKS_API_TOKEN:-pks_default_token_change_in_production}

; RFID Reader Configuration
rfid_reader_enabled = True
rfid_reader_port = /dev/ttyUSB0
rfid_reader_baudrate = 9600

; Weighbridge Scale Configuration
scale_enabled = True
scale_type = serial
scale_port = /dev/ttyUSB1
scale_baudrate = 9600

; Quality Control Configuration
quality_auto_grade = True
quality_photo_required = True

; LHP Configuration
lhp_auto_create = True
lhp_auto_create_time = 00:05:00

; Notification
notification_enabled = True
notification_email = admin@pks.local

; Backup
backup_enabled = True
backup_time = 02:00:00
backup_retention_days = 30
